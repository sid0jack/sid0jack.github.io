{{ define "main" }}
<div class="intro">
  {{ .Content }}
</div>
<h2 class="section-heading">Recent writing</h2>
<ul class="post-list">
  {{- range first 10 (where .Site.RegularPages "Section" "writing") }}
  <li>
    <span class="post-date">{{ .Date.Format "Jan 2, 2006" }}</span>
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    <span class="reading-time">{{ .ReadingTime }} min</span>
  </li>
  {{- end }}
</ul>
{{ end }}
