{{ define "main" }}
<article>
  <h1>{{ .Title }}</h1>
  {{ if .Date }}
  <div class="meta">
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
    <span class="reading-time">{{ .ReadingTime }} min read</span>
    {{ with .Params.tags }}
    <span class="tags">
      {{ range . }}<a href="{{ "tags/" | absURL }}{{ . | urlize }}/">{{ . }}</a>{{ end }}
    </span>
    {{ end }}
  </div>
  {{ end }}
  {{ .Content }}
</article>
<div class="back-link">
  <a href="{{ if eq .Section "writing" }}/writing/{{ else }}/{{ end }}">&larr; Back</a>
</div>
{{ end }}
