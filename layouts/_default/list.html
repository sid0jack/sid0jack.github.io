{{ define "main" }}
{{ .Content }}
{{ range .Pages.GroupByDate "2006" "desc" }}
<div class="year-group">
  <h2>{{ .Key }}</h2>
  <ul class="post-list">
    {{- range .Pages }}
    <li>
      <span class="post-date">{{ .Date.Format "Jan 2" }}</span>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      <span class="reading-time">{{ .ReadingTime }} min</span>
    </li>
    {{- end }}
  </ul>
</div>
{{ end }}
{{ end }}
