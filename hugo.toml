baseURL = "https://sid0jack.github.io/"
languageCode = "en-us"
title = "Siddhant Nayak"

[params]
  description = "Siddhant Nayak's blog — software, craft, and the occasional digression."
  author = "Siddhant Nayak"


[markup]
  [markup.highlight]
    style = "catppuccin-mocha"
    noClasses = false
    guessSyntax = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[permalinks]
  writing = "/writing/:slug/"

[outputFormats]
  [outputFormats.RSS]
    baseName = "feed"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[menus]
  [[menus.main]]
    name = "Writing"
    url = "/writing/"
    weight = 1
  [[menus.main]]
    name = "About"
    url = "/about/"
    weight = 2
  [[menus.main]]
    name = "Now"
    url = "/now/"
    weight = 3
  [[menus.main]]
    name = "Colophon"
    url = "/colophon/"
    weight = 4

[taxonomies]
  tag = "tags"
